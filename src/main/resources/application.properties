# Server
server.port=8080
spring.application.name=payflow-backend

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:payflow_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:payflow2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:payflow_secret_key_super_secure_2024_minimum_256bits_ok}
jwt.expiration=86400000

# Swagger
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Mail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sabihelmouna@gmail.com
spring.mail.password=k f p k z a c e h z v n c w u l
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Allowed Origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

